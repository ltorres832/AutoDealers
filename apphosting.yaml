buildConfig:
  runtime: nodejs20
  buildCommand: |
    npm install --legacy-peer-deps && 
    ./node_modules/.bin/turbo run build --filter=@autodealers/public-web && 
    mkdir -p .next/standalone/apps/public-web/.next/static &&
    cp -r apps/public-web/.next/static/. .next/standalone/apps/public-web/.next/static &&
    mkdir -p .next/standalone/apps/public-web/public &&
    cp -r apps/public-web/public/. .next/standalone/apps/public-web/public &&
    mkdir -p .next/standalone/.next/static &&
    cp -r apps/public-web/.next/static/. .next/standalone/.next/static &&
    mkdir -p .next/standalone/public &&
    cp -r apps/public-web/public/. .next/standalone/public &&
    cp -r apps/public-web/.next/standalone/. .next/standalone/
  outputDir: .next/standalone

runConfig:
  concurrency: 100
  maxInstances: 10
  minInstances: 0

env:
  - variable: FIREBASE_PROJECT_ID
    value: autodealers-7f62e
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: autodealers-7f62e
  - variable: NODE_ENV
    value: production
  - variable: SKIP_FIREBASE
    value: "false"
  # Secretaría de Firebase
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
  # Admin SDK (Opcional si ADC está activo, pero mejor tenerlo)
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
  # Otros integraciones
  - variable: META_VERIFY_TOKEN
    secret: META_VERIFY_TOKEN
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
  - variable: NEXTAUTH_SECRET
    secret: NEXTAUTH_SECRET
