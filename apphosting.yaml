buildConfig:
  runtime: nodejs20
  buildCommand: |
    npm install --legacy-peer-deps && 
    npx turbo run build --filter=@autodealers/public-web && 
    mkdir -p .next/standalone/apps/public-web/.next/static &&
    cp -r apps/public-web/.next/static/. .next/standalone/apps/public-web/.next/static &&
    mkdir -p .next/standalone/apps/public-web/public &&
    cp -r apps/public-web/public/. .next/standalone/apps/public-web/public &&
    cp -r apps/public-web/.next/standalone/. .next/standalone/
  outputDir: .next/standalone

runConfig:
  concurrency: 100
  maxInstances: 10
  minInstances: 0

env:
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: autodealers-7f62e
  - variable: NODE_ENV
    value: production
  - variable: SKIP_FIREBASE
    value: "true"
