name: autodealers_flutter
description: AutoDealers Platform - Flutter App (Mobile + Web)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  firebase_messaging: ^16.1.1
  cloud_functions: ^6.0.6
  
  # State Management
  provider: ^6.1.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # Networking
  http: ^1.1.0
  dio: ^5.4.0
  
  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # Utils
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  image_picker: ^1.0.4
  intl: ^0.20.2
  
  # Navigation
  go_router: ^17.1.0
  
  # Forms
  flutter_form_builder: ^10.3.0+1
  
  # Charts
  fl_chart: ^1.1.1
  
  # Calendar
  table_calendar: ^3.0.9
  
  # JSON Serialization
  json_annotation: ^4.8.1
  freezed_annotation: ^3.1.0
  
  # Dependency Injection
  get_it: ^9.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^3.2.5

flutter:
  uses-material-design: true
  
  # assets:
  #   - assets/images/
  #   - assets/icons/


