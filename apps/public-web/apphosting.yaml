      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ADMIN_URL
    value: https://admin.autodealers-online.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_DEALER_URL
    value: https://dealers.autodealers-online.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SELLER_URL
    value: https://sellers.autodealers-online.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ADVERTISER_URL
    value: https://ads.autodealers-online.com
