buildConfig:
  runtime: nodejs20
  # Monorepo: rootDir en firebase.json es apps/public-web; Cloud Build puede ejecutar el comando
  # desde esa carpeta (sin package-lock) o desde la raíz del repo. Subimos a la raíz si detectamos
  # el lockfile del workspace y construimos el paquete por nombre.
  buildCommand: |
    set -e
    if [ -f ../../package-lock.json ]; then cd ../..; fi
    npm ci --legacy-peer-deps
    npm run build --workspace=@autodealers/shared
    npm run build --workspace=@autodealers/inventory
    npm run build --workspace=@autodealers/crm
    npm run build --workspace=@autodealers/public-web
  outputDir: .next/standalone

# CWD en Cloud Run = raíz del repo (/workspace). El standalone está en apps/public-web/.next/standalone
# postbuild crea apps/public-web/.next/standalone/server.js (bootstrap)
scripts:
  runCommand: node apps/public-web/.next/standalone/server.js

runConfig:
  concurrency: 100
  maxInstances: 10
  minInstances: 0

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: autodealers-7f62e
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: autodealers-7f62e.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_VAPID_KEY
    secret: NEXT_PUBLIC_FIREBASE_VAPID_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_PROJECT_ID
    value: autodealers-7f62e
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
