buildConfig:
  runtime: nodejs20
  # CWD = raíz del repo en App Hosting (igual que public-web). No usar `cd ../..`.
  buildCommand: npm ci --legacy-peer-deps && npm run build --workspace=@autodealers/shared && npm run build --workspace=@autodealers/core && cd apps/admin && npm run build
  outputDir: .next

runConfig:
  concurrency: 80
  maxInstances: 5
  minInstances: 0

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: autodealers-7f62e
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: autodealers-7f62e.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_VAPID_KEY
    secret: NEXT_PUBLIC_FIREBASE_VAPID_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_PROJECT_ID
    value: autodealers-7f62e
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME
  - variable: SKIP_FIREBASE
    value: "false"
    availability:
      - RUNTIME
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    value: https://admin-app--autodealers-7f62e.us-central1.hosted.app
    availability:
      - BUILD
      - RUNTIME
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME
